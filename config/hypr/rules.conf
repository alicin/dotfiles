# Float all windows by default; exceptions below override this
windowrule = float on, match:class .*

windowrule = float on, match:class ^(Rofi)$
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = float on, match:class ^(org.gnome.NautilusPreviewer)$
windowrule = float on, match:class ^(org.gnome.TextEditor)$
windowrule = float on, match:class ^(com.usebottles.bottles)$
windowrule = float on, match:class ^(com-azefsw-audioconnect-desktop-app-MainKt)$
windowrule = float on, match:class ^(steam)$
windowrule = float on, match:class ^(eww)$
windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(blueberry.py)$
windowrule = float on, match:class ^(org.gnome.Settings)$
windowrule = float on, match:class ^(org.gnome.design.Palette)$
windowrule = float on, match:class ^(Color Picker)$
windowrule = float on, match:class ^(Network)$
windowrule = float on, match:class ^(xdg-desktop-portal)$
windowrule = float on, match:class ^(xdg-desktop-portal-gnome)$
windowrule = float on, match:class ^(transmission-gtk)$
windowrule = float on, match:class ^(ags)$
windowrule = fullscreen on, match:class ^(Waydroid)$
windowrule = float on, match:class ^(CurseForge)$
windowrule = float on, match:class ^(VirtualBox Manager)$
windowrule = float on, match:class ^(org.corectrl.corectrl)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(hyprland-share-picker)$
windowrule = float on, match:class ^(mpv)$
windowrule = float on, match:class ^(ascension launcher.exe)$
windowrule = float on, match:title ^(Ascension launcher.exe)$
windowrule = float on, match:class ^(net.lutris.Lutris)$
windowrule = float on, match:class ^(xdg-desktop-portal-gtk)$

windowrule {
  name = floating_media_70
  float = on
  size = (monitor_w*0.7) (monitor_h*0.7)
  match:class = ^(imv|mpv|Picture-in-Picture)$
  center = on
}

windowrule {
  name = pulseaudio
  float = on
  size = (monitor_w*0.5) (monitor_h*0.8)
  match:class = ^(Pavucontrol|org.pulseaudio.pavucontrol)$
  center = on
}

windowrule {
  name = floating_pamac_60
  float = on
  size = (monitor_w*0.6) (monitor_h*0.6)  
  match:class = ^(org.manjaro.pamac.manager)$
  center = on
}

windowrule {
  name = floating_nautilus_60
  float = on
  size = 768 756
  match:class = ^(org.gnome.Nautilus)$
  center = on
}

# TERMINAL
windowrule {
  name = floating_shell_60
  float = on
  size = 920 580
  center = on
  match:class = ^(com.ali.floating_shell)$
}

windowrule {
  name = floating_shell_portrait
  float = on
  size = (monitor_w*0.35) (monitor_h*0.8)
  center = on
  match:class = ^(com.ali.floating_shell_portrait)$
}

windowrule {
  name = scrcpy_float_fix
  float = on
  size = 508 1125
  center = on
  match:class = ^(scrcpy)$
  monitor = eDP-1
}


# MISC
windowrule = no_shadow on, match:float on

# SPECIAL WORKSPACE
windowrule = workspace special:void silent, match:title ^(meet.google.com is sharing a window.)$
windowrule = workspace special:void silent, match:class ^(explorer.exe)$

# ── Tiled exceptions (override the global float rule above) ──────────────────

# Browsers
windowrule = float off, match:class ^(firefox|Firefox|LibreWolf|librewolf|Floorp|floorp|Waterfox|waterfox)$
windowrule = float off, match:class ^(google-chrome|chromium|Chromium|Brave-browser|brave-browser|microsoft-edge|vivaldi|Vivaldi|opera|Opera)$

# Code editors / IDEs
windowrule = float off, match:class ^(code|code-oss|VSCodium|vscodium|cursor|Cursor)$

# Terminals
windowrule = float off, match:class ^(kitty|Alacritty|alacritty|foot|foot-direct|footclient)$
windowrule = float off, match:class ^(wezterm|org.wezfurlong.wezterm|WezTerm)$
windowrule = float off, match:class ^(gnome-terminal|konsole|xterm|xterm-256color|tilix|Tilix)$

# World of Warcraft — fullscreen
windowrule = fullscreen on, match:class ^([Ww]ow[.-]?exe|[Ww]orld[Oo]f[Ww]arcraft)$
windowrule = fullscreen on, match:title ^(World of Warcraft)$
