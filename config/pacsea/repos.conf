# Pacsea third-party repository definitions (TOML)
#
# Active path: ~/.config/pacsea/repos.conf (Config → Lists → Repositories, or press o in that modal).
#
# Each [[repo]] needs name + results_filter. Optional: id, enabled, server, sig_level, key_id,
# key_server, mirrorlist, mirrorlist_url. Hyphens in results_filter normalize to underscores for
# settings.conf keys: results_filter_show_<token> = true|false
#
# Rows below are shipped disabled (enabled = false). Enable only the repos you use, then Apply
# from Options → Repositories (verify mirrors, SigLevel, and keys with upstream docs first).
#
# Built-in pacman repo names (core, extra, endeavouros, blackarch, …) are indexed by Pacsea
# without a [[repo]] row; add a row here when you want a saved recipe or Apply-managed drop-in.

# --- EndeavourOS [endeavouros] ---
[[repo]]
id = "endeavouros"
name = "endeavouros"
results_filter = "endeavouros"
enabled = false
server = "https://mirror.alpix.eu/endeavouros/repo/$repo/$arch"
sig_level = "PackageRequired"
# Keys: EndeavourOS docs / endeavouros-keyring.

